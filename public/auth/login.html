<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ninja | Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <script>
    (function() {
      const theme = localStorage.getItem('ninja-theme') || 'dark';
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="/assets/css/index.css?v=6"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="page">
  <div class="auth-card card-glossy">
    <div class="text-center mb-6">
      <div class="brand-logo mb-4" style="display: flex; justify-content: center;">
        <div style="background-color: var(--ninja-white); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
          <i class="ph-bold ph-lightning" style="color: black; font-size: 1.5rem;"></i>
        </div>
      </div>
      <h2 class="page-title text-center" style="font-size: 1.5rem;">Welcome Back</h2>
      <p class="page-subtitle" style="font-size: 0.875rem;">Login to your Ninja workstation</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@company.com" required=""/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required=""/>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary w-full mt-4">
        <span>Login</span>
      </button>
    </form>

    <div class="text-center mt-6 small">
      <p class="text-slate">Don&#39;t have an account? <a href="/auth/signup" class="text-white hover:underline">Sign Up</a></p>
    </div>
  </div>
</div>

<script src="/assets/js/auth/login.js" defer=""></script>

  </div>

<script src="/assets/js/index.js?v=6" defer=""></script>


</body></html>
