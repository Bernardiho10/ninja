<div class="page-container" data-ham-page-config='{"layout": "../../admin.lhtml"}'>
  <div class="page-header flex flex-row items-center justify-between mb-2">
    <div>
      <h1 class="page-title">Business Ecosystem</h1>
      <p class="page-subtitle">Verification workflow and platform governance.</p>
    </div>
    <div class="flex items-center gap-3">
      <button class="btn btn-secondary shadow-sm">
        <i class="ph-bold ph-export"></i>
        <span>Export Reports</span>
      </button>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="admin-tabs">
    <div class="admin-tab active" data-tab="approved">
      Approved <span class="count-badge">124</span>
    </div>
    <div class="admin-tab" data-tab="pending">
      Pending Review <span class="count-badge" style="background: hsl(38 92% 50% / 0.1); color: hsl(38 92% 50%); border: 1px solid hsl(38 92% 50% / 0.2);">8</span>
    </div>
    <div class="admin-tab" data-tab="rejected">
      Rejected <span class="count-badge">12</span>
    </div>
  </div>

  <!-- Data Display Card -->
  <div class="card card-glossy">
    <div class="flex items-center gap-4 mb-6">
      <div class="flex-1 relative">
        <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
        <input type="text" placeholder="Search by name, RC number, or email..." class="form-control pl-10" id="biz-search">
      </div>
    </div>

    <div class="table-container relative overflow-x-auto">
      <table class="w-full text-left border-collapse" id="biz-table">
        <thead>
          <tr class="border-b border-border/50">
            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Entity</th>
            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-muted-foreground" data-col="special">Revenue (MTD) / Reason</th>
            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Metrics</th>
            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Status</th>
            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-border/30" id="biz-table-body">
          <!-- Rows will be injected/filtered by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal: Business Details -->
<div class="modal-overlay" id="modal-details">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Business Intelligence</h2>
      <div class="modal-close" onclick="closeModal('modal-details')"><i class="ph-bold ph-x"></i></div>
    </div>
    <div class="modal-body" id="details-body">
      <!-- Content injected by JS -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-details')">Close</button>
      <button class="btn btn-primary" id="btn-action-primary">Save Changes</button>
    </div>
  </div>
</div>

<!-- Modal: Document Review -->
<div class="modal-overlay" id="modal-docs">
  <div class="modal-content" style="max-width: 800px;">
    <div class="modal-header">
      <h2 class="modal-title">Compliance Document Review</h2>
      <div class="modal-close" onclick="closeModal('modal-docs')"><i class="ph-bold ph-x"></i></div>
    </div>
    <div class="modal-body">
      <div class="doc-grid" id="docs-body">
        <!-- Docs injected by JS -->
      </div>
      
      <div style="margin-top: 2rem; padding: 1.5rem; border: 1px solid hsl(var(--border) / 0.5); border-radius: 12px; background: hsl(var(--secondary) / 0.05);">
        <h4 style="margin-bottom: 1rem; font-size: 0.9rem;">Review Decision</h4>
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase mb-2">Rejection Reason (Internal Only)</label>
            <textarea class="form-control" id="reject-reason" placeholder="Explain why the documents were rejected..."></textarea>
          </div>
          <div class="flex justify-end gap-3">
             <button class="btn text-destructive hover:bg-destructive/10" onclick="processDecision('rejected')">Reject Application</button>
             <button class="btn btn-primary" onclick="processDecision('approved')">Approve Business</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const businesses = [
    { id: 1, name: 'Acme Corp', logo: 'A', rc: 'RC123456', email: 'admin@acme.com', rev: '₦12,450,000', requests: '850K', success: '99.2%', status: 'approved', docs: ['ID.pdf', 'CAC.pdf'] },
    { id: 2, name: 'Globex Inc.', logo: 'G', rc: 'RC654321', email: 'hello@globex.org', rev: '₦8,200,000', requests: '420K', success: '98.5%', status: 'approved', docs: ['ID.pdf', 'CAC.pdf'] },
    { id: 3, name: 'Soylent Corp', logo: 'S', rc: 'RC000123', email: 'contact@soylent.co', reason: 'Suspicious API activity', requests: '92K', success: '82.1%', status: 'rejected' },
    { id: 4, name: 'PayStack Ventures', logo: 'P', rc: 'RC998877', email: 'kyc@paystackv.com', rev: '₦0', requests: '0', success: '0%', status: 'pending', docs: ['passport.jpg', 'reg_cert.pdf', 'utility_bill.png'] },
    { id: 5, name: 'Vanguard Tech', logo: 'V', rc: 'RC776655', email: 'ops@vanguard.io', rev: '₦0', requests: '0', success: '0%', status: 'pending', docs: ['license.pdf', 'cac_form7.pdf'] },
    { id: 6, name: 'VaultBase', logo: 'B', rc: 'RC554433', email: 'legal@vaultbase.com', rev: '₦385,000', requests: '48K', success: '94.2%', status: 'approved' },
  ];

  let currentTab = 'approved';

  function renderTable() {
    const tbody = document.getElementById('biz-table-body');
    const search = document.getElementById('biz-search').value.toLowerCase();
    
    const filtered = businesses.filter(b => {
      const matchTab = b.status === currentTab;
      const matchSearch = b.name.toLowerCase().includes(search) || b.rc.toLowerCase().includes(search);
      return matchTab && matchSearch;
    });

    tbody.innerHTML = filtered.map(b => `
      <tr>
        <td class="p-4">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-xs font-bold text-primary">${b.logo}</div>
            <div>
              <p class="font-bold text-sm">${b.name}</p>
              <p class="text-xs text-muted-foreground">${b.rc}</p>
            </div>
          </div>
        </td>
        <td class="p-4">
          ${b.status === 'rejected' 
            ? `<span class="text-xs text-destructive italic font-medium">"${b.reason}"</span>` 
            : `<span class="font-bold text-sm">${b.rev || '₦0'}</span>`
          }
        </td>
        <td class="p-4">
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold">${b.success || '0%'}</span>
            <div class="w-20 h-1 rounded-full bg-secondary overflow-hidden">
               <div class="h-full ${b.status === 'rejected' ? 'bg-destructive' : 'bg-bou-green'}" style="width: ${b.success || '0%'}"></div>
            </div>
          </div>
        </td>
        <td class="p-4">
          <span class="status-pill ${b.status}">${b.status.charAt(0).toUpperCase() + b.status.slice(1)}</span>
        </td>
        <td class="p-4">
          <div class="flex gap-2">
            ${b.status === 'pending' 
              ? `<button class="btn btn-secondary btn-sm" onclick="openDocs(${b.id})"><i class="ph-bold ph-files"></i> Review Docs</button>`
              : `<button class="btn btn-secondary btn-sm" onclick="openDetails(${b.id})"><i class="ph-bold ph-eye"></i> Details</button>`
            }
          </div>
        </td>
      </tr>
    `).join('');
  }

  function openDetails(id) {
    const b = businesses.find(x => x.id === id);
    const body = document.getElementById('details-body');
    body.innerHTML = `
      <div class="biz-avatar-large">${b.logo}</div>
      <div class="detail-row"><span class="detail-label">Legal Name</span><span class="detail-value text-lg font-bold">${b.name}</span></div>
      <div class="detail-row"><span class="detail-label">Registration</span><span class="detail-value">${b.rc}</span></div>
      <div class="detail-row"><span class="detail-label">Official Email</span><span class="detail-value text-primary">${b.email}</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value status-pill ${b.status}">${b.status}</span></div>
      <div class="detail-row"><span class="detail-label">Total Volume</span><span class="detail-value font-bold">${b.rev || '₦0'} (MTD)</span></div>
      <div class="detail-row"><span class="detail-label">Health Score</span><span class="detail-value font-bold" style="color: hsl(var(--bou-green));">${b.success} Success</span></div>
    `;
    document.getElementById('modal-details').classList.add('active');
  }

  function openDocs(id) {
    const b = businesses.find(x => x.id === id);
    const body = document.getElementById('docs-body');
    body.innerHTML = (b.docs || ['Document_1.pdf', 'Document_2.pdf']).map(doc => `
      <div class="doc-card">
        <div class="flex items-center justify-between">
          <span class="text-xs font-bold truncate" style="max-width: 200px;">${doc}</span>
          <i class="ph-bold ph-download-simple cursor-pointer hover:text-primary"></i>
        </div>
        <div class="doc-preview-placeholder">
          <i class="ph-duotone ph-file-${doc.split('.').pop() === 'pdf' ? 'pdf' : 'image'}"></i>
          <span>Click to Full Preview</span>
        </div>
      </div>
    `).join('');
    document.getElementById('modal-docs').classList.add('active');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
  }

  function processDecision(decision) {
    alert(`Business decision recorded as: ${decision}`);
    closeModal('modal-docs');
  }

  // Init
  document.addEventListener('DOMContentLoaded', () => {
    renderTable();

    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelector('.admin-tab.active').classList.remove('active');
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderTable();
      });
    });

    document.getElementById('biz-search').addEventListener('input', renderTable);
  });
</script>
