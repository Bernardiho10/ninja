<div class="page" data-ham-page-config='{"layout": "../minimal.lhtml"}'>
  <div class="auth-card card-glossy">
    <div class="text-center mb-6">
      <div class="brand-logo mb-4" style="display: flex; justify-content: center;">
        <div style="background-color: var(--ninja-white); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
          <i class="ph-bold ph-lightning" style="color: black; font-size: 1.5rem;"></i>
        </div>
      </div>
      <h2 class="page-title text-center" style="font-size: 1.5rem;">Welcome Back</h2>
      <p class="page-subtitle" style="font-size: 0.875rem;">Login to your Ninja workstation</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary w-full mt-4">
        <span>Login</span>
      </button>
    </form>

    <div class="text-center mt-6 small">
      <p class="text-slate">Don't have an account? <a href="/auth/signup" class="text-white hover:underline">Sign Up</a></p>
    </div>
  </div>
</div>

<script src="/assets/js/auth/login.js" defer></script>
